name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build (e.g. v0.1.0). Optional; only used when not triggered by a tag push.'
        required: false
        default: ''

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Conservative network timeouts so flaky mirrors don't wedge a release.
  CARGO_NET_RETRY: 10
  CARGO_HTTP_TIMEOUT: 60

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    cross: false, archive: tar.gz }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,   cross: true,  archive: tar.gz }
          - { os: macos-latest,   target: x86_64-apple-darwin,         cross: false, archive: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,        cross: false, archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,      cross: false, archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Build dashboard (rust-embed needs dist/)
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (cross-compile only)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --release --locked \
            --target "$TARGET" \
            --features all-langs,local-embeddings \
            -p understandable

      - name: Build (cross)
        if: matrix.cross
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cross build --release --locked \
            --target "$TARGET" \
            --features all-langs,local-embeddings \
            -p understandable

      - name: Stage release artifacts
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_FMT: ${{ matrix.archive }}
          RUNNER_OS_NAME: ${{ matrix.os }}
        run: |
          set -euo pipefail
          BIN=understandable
          if [ "$RUNNER_OS_NAME" = "windows-latest" ]; then
            BIN=understandable.exe
          fi
          STAGE="understandable-${TARGET}"
          mkdir -p "dist/${STAGE}"
          cp "target/${TARGET}/release/${BIN}" "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" 2>/dev/null || true
          cp LICENSE   "dist/${STAGE}/" 2>/dev/null || true
          cp LICENSE-* "dist/${STAGE}/" 2>/dev/null || true

          cd dist
          if [ "${ARCHIVE_FMT}" = "zip" ]; then
            7z a "../understandable-${TARGET}.zip" "${STAGE}"
          else
            tar czf "../understandable-${TARGET}.tar.gz" "${STAGE}"
          fi
          cd ..
          ls -la

      - name: Compute checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_FMT: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          ART="understandable-${TARGET}.${ARCHIVE_FMT}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ART}" > "${ART}.sha256"
          else
            shasum -a 256 "${ART}" > "${ART}.sha256"
          fi
          cat "${ART}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          if-no-files-found: error
          path: |
            understandable-${{ matrix.target }}.tar.gz
            understandable-${{ matrix.target }}.zip
            understandable-${{ matrix.target }}.tar.gz.sha256
            understandable-${{ matrix.target }}.zip.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Determine prerelease flag
        id: prerel
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          REF="${REF_NAME}"
          if [ -z "$REF" ] && [ -n "$DISPATCH_TAG" ]; then
            REF="$DISPATCH_TAG"
          fi
          if echo "$REF" | grep -q '-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: CHANGES.md
          generate_release_notes: false
          prerelease: ${{ steps.prerel.outputs.is_prerelease == 'true' }}
          fail_on_unmatched_files: true

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Skip on prereleases (tags containing '-', e.g. v0.1.0-rc1).
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crates
      - name: Publish workspace crates in topological order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN secret not set; skipping crates.io publish."
            exit 0
          fi
          # Order respects internal dependency graph:
          #   ua-core → ua-extract → ua-analyzer → ua-search → ua-persist → ua-llm → ua-server → ua-cli (understandable)
          for crate in ua-core ua-extract ua-analyzer ua-search ua-persist ua-llm ua-server understandable; do
            echo "::group::cargo publish -p ${crate}"
            cargo publish -p "${crate}" --no-verify --locked || \
              echo "::warning::cargo publish -p ${crate} failed (already published or not yet ready)"
            echo "::endgroup::"
            # crates.io needs a moment to index a freshly published crate before its dependents resolve.
            sleep 30
          done
