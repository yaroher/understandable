# Deploy Docusaurus site (en + ru) to GitHub Pages.
#
# SETUP REQUIRED (one-time, done in repo settings by maintainer):
#   1. Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#   2. Confirm `website/docusaurus.config.ts` has correct `url`/`baseUrl`/
#      `organizationName`/`projectName`. Currently set to:
#        url:              https://yaroher.github.io
#        baseUrl:          /understandable/
#        organizationName: yaroher
#        projectName:      understandable
#      => published site:  https://yaroher.github.io/understandable/
#   3. The `github-pages` environment is auto-created on first deploy.
#
# Notes:
#   * Docusaurus i18n: `npm run build` builds ALL locales declared in
#     `i18n.locales` ([en, ru]) into `build/` (en at root, ru at build/ru/).
#   * If `website/package-lock.json` is missing (first run), `npm ci` falls
#     back to `npm install` so the workflow still succeeds. Commit the
#     lockfile afterwards for reproducible installs and proper cache hits.
#
# Security: this workflow does not consume any untrusted event payload
# fields (issue/PR titles, commit messages, etc.) in `run:` blocks, so it
# is not exposed to script-injection vectors.

name: Deploy Docs

on:
  push:
    tags: ['v*']
    branches: [main, master]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs (en + ru)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        # `npm ci` requires package-lock.json; fall back to `npm install`
        # for the first run before a lockfile is committed.
        run: npm ci || npm install

      - name: Build site (all locales)
        working-directory: website
        run: npm run build

      - name: Verify locales were built
        working-directory: website
        run: |
          set -e
          if [ -f build/index.html ]; then
            echo "[ok] en built (build/index.html)"
          else
            echo "[fail] en missing"
            exit 1
          fi
          if [ -d build/ru ] && [ -f build/ru/index.html ]; then
            echo "[ok] ru built (build/ru/index.html)"
          else
            echo "[fail] ru missing"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
