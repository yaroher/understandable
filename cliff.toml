# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Header rendered at the top of the full changelog. Stripped via --strip header
# in the release workflow so only the latest section ends up in release notes.
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
    # Linkify GitHub issue/PR references like (#123).
    { pattern = '\((#[0-9]+)\)', replace = "([#${1}](https://github.com/yaroher/understandable/issues/${1}))" },
]
commit_parsers = [
    { message = "^feat",     group = "Features" },
    { message = "^fix",      group = "Bug Fixes" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^docs",     group = "Documentation" },
    { message = "^test",     group = "Tests" },
    { message = "^build",    group = "Build" },
    { message = "^ci",       group = "CI" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore",    group = "Chore" },
    { message = "^style",    group = "Style" },
    { message = "^revert",   group = "Reverts" },
    { body = ".*security",   group = "Security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
